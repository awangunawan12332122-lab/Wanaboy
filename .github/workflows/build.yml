name: Build APK WanaboyAI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: "temurin"
        java-version: "17"

    - name: Install System Dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          git zip unzip autoconf libtool pkg-config \
          zlib1g-dev libncurses5-dev libncursesw5-dev \
          libtinfo6 cmake libffi-dev libssl-dev

    - name: Install Python Dependencies
      run: |
        pip install --upgrade pip
        pip install buildozer cython

    # 🔥 Android SDK resmi
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    # 🔥 Install SDK FIX
    - name: Install SDK Components
      run: |
        yes | sdkmanager --licenses
        sdkmanager \
          "platform-tools" \
          "platforms;android-31" \
          "build-tools;31.0.0" \
          "ndk;25.2.9519653"

    # 🔥 FIX BUILD0ZER PATH (KUNCI)
    - name: Fix Buildozer SDK Path
      run: |
        mkdir -p /home/runner/.buildozer/android/platform
        ln -s $ANDROID_SDK_ROOT /home/runner/.buildozer/android/platform/android-sdk

    # 🔍 CEK AIDL (BIAR TENANG)
    - name: Check AIDL
      run: |
        ls $ANDROID_SDK_ROOT/build-tools/31.0.0
        which aidl || echo "AIDL OK via build-tools"

    # 🚀 BUILD
    - name: Build APK
      run: buildozer android debug

    # 📦 HASIL
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: WanaboyAI-APK
        path: bin/*.apk
