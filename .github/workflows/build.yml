name: Build APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - uses: actions/setup-java@v4
      with:
        distribution: "temurin"
        java-version: "17"

    - name: Install deps
      run: |
        sudo apt update
        sudo apt install -y git zip unzip autoconf libtool pkg-config \
        zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake \
        libffi-dev libssl-dev

    - name: Install python deps
      run: |
        pip install buildozer cython

    # 🔥 Android otomatis (paling aman)
    - uses: android-actions/setup-android@v3

    # 🔥 Install SDK FIX
    - name: Install SDK
      run: |
        yes | sdkmanager --licenses
        sdkmanager "platform-tools" "platforms;android-31" "build-tools;31.0.0"

    # 🔥 FIX AIDL (kunci utama)
    - name: Fix AIDL
      run: |
        export PATH=$ANDROID_HOME/build-tools/31.0.0:$PATH
        which aidl

    - name: Build
      run: buildozer android debug

    - uses: actions/upload-artifact@v4
      with:
        name: apk
        path: bin/*.apk
