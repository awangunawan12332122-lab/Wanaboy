name: Build APK WanaboyAI

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: "temurin"
        java-version: "17"

    - name: Install Dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          git zip unzip openjdk-17-jdk \
          autoconf libtool pkg-config \
          zlib1g-dev libncurses5-dev libffi-dev \
          libssl-dev cmake

    - name: Install Python Tools
      run: |
        pip install --upgrade pip
        pip install buildozer cython

    # 🔥 INSTALL SDK MANUAL (BUKAN ACTION)
    - name: Install Android SDK (FIX TOTAL)
      run: |
        mkdir -p $HOME/android-sdk
        cd $HOME/android-sdk

        wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O sdk.zip
        unzip sdk.zip
        mv cmdline-tools cmdline-tools-temp
        mkdir cmdline-tools
        mv cmdline-tools-temp cmdline-tools/latest

        export ANDROID_HOME=$HOME/android-sdk
        export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH

        yes | sdkmanager --licenses

        sdkmanager \
          "platform-tools" \
          "platforms;android-31" \
          "build-tools;31.0.0" \
          "ndk;25.2.9519653"

        echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
        echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
        echo "PATH=$HOME/android-sdk/cmdline-tools/latest/bin:$HOME/android-sdk/platform-tools:$PATH" >> $GITHUB_ENV

    # 🔥 FIX PALING PENTING
    - name: Fix Buildozer Path (ANTI ERROR)
      run: |
        mkdir -p ~/.buildozer/android/platform
        ln -s $ANDROID_HOME ~/.buildozer/android/platform/android-sdk
        ln -s $ANDROID_HOME/ndk/25.2.9519653 ~/.buildozer/android/platform/android-ndk-r25b

    # 🔥 PASTIKAN AIDL ADA
    - name: Fix AIDL
      run: |
        export PATH=$ANDROID_HOME/build-tools/31.0.0:$PATH
        which aidl || ls $ANDROID_HOME/build-tools/31.0.0

    - name: Build APK
      run: |
        buildozer android clean
        buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: WanaboyAI-APK
        path: bin/*.apk
